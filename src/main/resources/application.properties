# ================= Spring Boot Application =================
spring.application.name=it-asset-management
server.port=8080

# ================= PostgreSQL Datasource =================
spring.datasource.url=jdbc:postgresql://localhost:5432/itams_db
spring.datasource.username=postgres
spring.datasource.password=12345
spring.datasource.driver-class-name=org.postgresql.Driver

# ================= JPA / Hibernate =================
# Automatically create missing tables & columns, preserve existing data
spring.jpa.hibernate.ddl-auto=update

# Show SQL queries in console (for debugging)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Disable automatic data.sql initialization
spring.sql.init.mode=never

# ================= Thymeleaf =================
spring.thymeleaf.cache=false

# ================= JWT Settings =================
jwt.secret=yourSuperStrongRandomSecretKeyAtLeast32Chars
jwt.expirationMs=3600000

# ================= Misc =================
spring.main.allow-bean-definition-overriding=true